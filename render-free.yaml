# FREE Render Blueprint — Postgres FTS + pgvector, NO Elasticsearch.
#
# This is the $0 path: one free web service + one free PostgreSQL database
# (with the pgvector extension). Search runs on Postgres full-text search fused
# with pgvector kNN — the same REST API and frontend, no Elasticsearch cluster.
#
# DEPLOY: Render dashboard → New ▾ → Blueprint → pick this repo → set the
# blueprint file to "render-free.yaml" → Apply. That's it — the container's
# entrypoint (deploy/entrypoint-free.sh) auto-runs index-init + collections-init,
# seeds the offline demo docs, and then ingests a few hundred real arXiv papers
# in the background (idempotent, resumable). No Shell commands required.
#
# This creates the BACKEND API, named "bethesdasearch-api" →
# https://bethesdasearch-api.onrender.com, which the frontend already targets
# (frontend/config.js PROD_API_BASE). Keep it distinct from the FRONTEND, which
# is the "bethesdasearch" Render Static Site at https://bethesdasearch.onrender.com.
# If Render appends a suffix (name taken), update PROD_API_BASE or use ?api= / ⚙︎.
#
# Notes:
#   • Free web services sleep after ~15 min idle and cold-start on the next hit.
#   • Embeddings use the deterministic fallback (ENGINE_EMBEDDING_FALLBACK=true);
#     lexical FTS does the heavy lifting. For true semantic vectors, move to a
#     paid instance with deploy/Dockerfile (torch) and set the flag to "false".

databases:
  - name: bethesda-postgres
    databaseName: engine
    user: engine
    plan: free # $0; note: free databases are removed after ~30 days

services:
  - type: web
    name: bethesdasearch-api
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.free
    dockerContext: .
    plan: free
    healthCheckPath: /up/
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "1" # keep memory low on the 512 MB free instance
      - key: ENGINE_BACKEND
        value: postgres
      - key: ENGINE_EMBEDDING_FALLBACK
        value: "true"
      - key: ENGINE_INDEX
        value: engineering_docs
      # Background corpus seeding on boot (real arXiv papers, no API key).
      # Set SEED_CORPUS=false to disable; raise SEED_CORPUS_TARGET for more docs.
      - key: SEED_CORPUS
        value: "true"
      - key: SEED_CORPUS_TARGET
        value: "300"
      - key: DATABASE_URL
        fromDatabase:
          name: bethesda-postgres
          property: connectionString
