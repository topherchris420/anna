name: Deploy frontend to Vercel (manual)

# NOTE: Automatic deploys are handled by Vercel's Git integration — the repo-root
# vercel.json makes it serve frontend/ on every push. This workflow is a MANUAL
# FALLBACK for deploying frontend/ via the Vercel CLI (e.g. if you disconnect the
# dashboard Git integration). It is intentionally NOT triggered on push, so the
# two paths never double-deploy. Run it from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       a Vercel access token (Vercel -> Account -> Tokens)
#   VERCEL_ORG_ID      from `vercel link` -> frontend/.vercel/project.json
#   VERCEL_PROJECT_ID  from `vercel link` -> frontend/.vercel/project.json
#
# If those secrets are absent the run still succeeds — it logs a warning and
# skips the deploy. See frontend/README.md and docs/DEPLOYMENT.md.

on:
  workflow_dispatch:
    inputs:
      production:
        description: "Deploy to production (unchecked = preview)"
        type: boolean
        default: true

concurrency:
  group: vercel-frontend-manual
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      IS_PROD: ${{ inputs.production }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel configuration
        id: check
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are not set — skipping deploy. See frontend/README.md."
          fi

      - name: Set up Node
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        if: steps.check.outputs.configured == 'true'
        run: |
          ENV=$([ "$IS_PROD" = "true" ] && echo production || echo preview)
          vercel pull --yes --environment="$ENV" --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: steps.check.outputs.configured == 'true'
        run: |
          if [ "$IS_PROD" = "true" ]; then
            URL=$(vercel deploy --prod --token="$VERCEL_TOKEN")
            echo "### ✅ Production deploy" >> "$GITHUB_STEP_SUMMARY"
          else
            URL=$(vercel deploy --token="$VERCEL_TOKEN")
            echo "### 🔍 Preview deploy" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Frontend deployed to: <$URL>" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed to: $URL"
