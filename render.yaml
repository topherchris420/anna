# Render Blueprint for the Vers3Dynamics Engineering Intelligence platform.
#
# Deploys the WHOLE backend the search engine needs — web, Elasticsearch,
# PostgreSQL (and, optionally, a Celery worker + Redis) — from one file. This
# app CANNOT run on Vercel/Dappling or a Render *Static Site*; those host
# frontends only. It needs these long-running, stateful services.
#
# HOW TO DEPLOY (do this, not a manual service):
#   Render dashboard → New → Blueprint → pick this repo → Apply.
# After the first deploy, open the WEB service → Shell and load some data:
#   flask engine index-init && flask engine collections-init && flask engine demo
#   # then real data, e.g.:  flask engine ingest arxiv -q "cat:eess.SY" -n 500
#
# 💸 COST: Elasticsearch needs ~2 GB RAM, so it can't run on a free plan — this
# blueprint uses paid instances (roughly $25/mo each for web + ES). There is no
# free Elasticsearch on Render. For a genuinely $0 option, self-host the whole
# docker-compose stack on a free VM (e.g. Oracle Cloud Always Free), or ask for
# the PostgreSQL+pgvector variant that drops Elasticsearch. See docs/DEPLOYMENT.md.

databases:
  - name: engine-postgres
    databaseName: engine
    user: engine
    # "free" is $0 but is deleted after ~30 days; use basic-256mb for anything
    # you want to keep.
    plan: free

services:
  # ----------------------------------------------------------------------- #
  # Web (Flask + gunicorn): UI at / and REST API at /api/v1
  # ----------------------------------------------------------------------- #
  - type: web
    name: engineering-intelligence
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    plan: standard # ~2 GB RAM: fits the local embedding model + app
    healthCheckPath: /up/
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "2"
      - key: ENGINE_INDEX
        value: engineering_docs
      - key: ELASTICSEARCH_HOST
        value: http://engine-elasticsearch:9200
      - key: DATABASE_URL
        fromDatabase:
          name: engine-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: engine-redis
          property: connectionString
      # Set to "true" to skip the ML model and run on the deterministic
      # embedding fallback (much lower memory; not semantically meaningful).
      - key: ENGINE_EMBEDDING_FALLBACK
        value: "false"

  # ----------------------------------------------------------------------- #
  # Background worker (Celery): off-request ingestion crawls.
  # OPTIONAL — search + synchronous `flask engine ingest` work without it. To
  # cut cost, delete this worker AND the redis service below AND the REDIS_URL
  # env on the web service. (Ingestion just runs in the web Shell instead.)
  # ----------------------------------------------------------------------- #
  - type: worker
    name: engine-worker
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    plan: standard
    autoDeploy: true
    dockerCommand: celery -A allthethings.app.celery_app worker -l info
    envVars:
      - key: ENGINE_INDEX
        value: engineering_docs
      - key: ELASTICSEARCH_HOST
        value: http://engine-elasticsearch:9200
      - key: DATABASE_URL
        fromDatabase:
          name: engine-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: engine-redis
          property: connectionString

  # ----------------------------------------------------------------------- #
  # Elasticsearch (private service): BM25 + dense-vector kNN index.
  # Reachable from web/worker on the private network at
  #   http://engine-elasticsearch:9200  (the ELASTICSEARCH_HOST above).
  # First boot takes ~30–60s; if the initial deploy flaps, redeploy the web
  # service once ES is green.
  # ----------------------------------------------------------------------- #
  - type: pserv
    name: engine-elasticsearch
    runtime: image
    image:
      url: docker.elastic.co/elasticsearch/elasticsearch:8.5.1
    plan: standard # ES needs headroom; do NOT use a free/starter plan (it OOMs)
    disk:
      name: es-data
      mountPath: /usr/share/elasticsearch/data
      sizeGB: 10
    envVars:
      - key: discovery.type
        value: single-node
      - key: network.host
        value: 0.0.0.0
      - key: http.port
        value: "9200"
      - key: xpack.security.enabled
        value: "false"
      - key: bootstrap.memory_lock
        value: "false"
      - key: ES_JAVA_OPTS
        value: -Xms512m -Xmx512m

  # ----------------------------------------------------------------------- #
  # Redis (Celery broker/result backend)
  # ----------------------------------------------------------------------- #
  - type: redis
    name: engine-redis
    plan: starter
    maxmemoryPolicy: noeviction # Celery requires noeviction
    ipAllowList: [] # internal only
