# pytest.ini - Pytest configuration for Anna's Archive

[pytest]
# Test discovery
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts =
    --strict-markers
    --strict-config
    --tb=short
    -ra
    --cov=allthethings
    --cov=lib
    --cov=data-imports
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    database: marks tests that require database

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout
timeout = 300

[coverage:run]
omit =
    */test/*
    */migrations/*
    */conftest.py
    */__pycache__/*
    */site-packages/*
    */engine_web/*
    */engine_api/*
    */engine_cli/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False